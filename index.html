<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimento Exclusivo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d47a1;
    color:#333;
}

.container{
    width:92%;
    max-width:420px;
    padding:45px 30px;
    border-radius:25px;
    background:linear-gradient(135deg,#fff 0%,#e3f2fd 100%);
    border:2px solid #e3f2fd;
    box-shadow:0 6px 32px rgba(33,150,243,0.10);
    text-align:center;
}

h1{
    font-size:32px;
    font-weight:900;
    color:#2196f3;
}

p{
    font-size:14px;
    margin:15px 0 30px;
    color:#333;
}

.progress-wrapper{
    width:100%;
    height:18px;
    background:#e5f0ff;
    border-radius:50px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#64b5f6,#2196f3);
    border-radius:50px;
    box-shadow:0 0 15px rgba(33,150,243,0.35);
    transition:width .3s;
}

.percent{
    margin-top:15px;
    font-size:26px;
    font-weight:900;
    color:#2196f3;
}

.timer{
    margin-top:10px;
    font-size:13px;
    color:#333;
}

button{
    margin-top:30px;
    padding:16px;
    width:100%;
    border:none;
    border-radius:50px;
    font-weight:800;
    font-size:16px;
    cursor:not-allowed;
    background:linear-gradient(90deg,#64b5f6,#2196f3);
    color:#fff;
    opacity:0.5;
    transition:.3s;
}

button.active{
    cursor:pointer;
    opacity:1;
    box-shadow:0 15px 40px rgba(33,150,243,0.35);
}

button.active:hover{
    transform:scale(1.05);
}

.legal-links{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

.legal-links a{
    color:#1565c0;
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
}

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    justify-content:center;
    align-items:center;
    padding:16px;
    z-index:999;
}

.modal{
    width:100%;
    max-width:560px;
    max-height:85vh;
    overflow-y:auto;
    background:#fff;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    padding:20px;
    text-align:left;
}

.modal h2{
    color:#2196f3;
    font-size:22px;
    margin-bottom:14px;
}

.modal h3{
    color:#0d47a1;
    margin:12px 0 8px;
    font-size:16px;
}

.modal p{
    margin:0 0 10px;
    color:#333;
    line-height:1.55;
    font-size:14px;
}

.modal-close{
    margin-top:8px;
    border:none;
    background:#2196f3;
    color:#fff;
    border-radius:10px;
    padding:10px 16px;
    font-weight:700;
    cursor:pointer;
}

.modal-close:hover{
    background:#1565c0;
}

.show-modal{
    display:flex;
}
</style>
</head>
<body>

<div class="container">
    <h1>Atendimento 2026</h1>
    <p>Validando sua condição personalizada...</p>

    <div class="progress-wrapper">
        <div id="progress" class="progress"></div>
    </div>

    <div id="percent" class="percent">0%</div>
    <div id="timer" class="timer">Aguarde...</div>

    <button id="btn" onclick="redirect()">LIBERANDO...</button>
    <div class="legal-links">
        <a onclick="openModal('termos')">Termos de Uso</a>
        <a onclick="openModal('privacidade')">Política de Privacidade</a>
    </div>
</div>

<div id="legalModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <h2 id="modalTitle">Termos de Uso</h2>
        <div id="modalContent"></div>
        <button class="modal-close" onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>
let value = 0;
const progress = document.getElementById("progress");
const percent = document.getElementById("percent");
const timer = document.getElementById("timer");
const btn = document.getElementById("btn");
const legalModal = document.getElementById("legalModal");
const modalTitle = document.getElementById("modalTitle");
const modalContent = document.getElementById("modalContent");

let countdown = 4;
const legalText = {
    termos: `
        <h3>1. Aceitação</h3>
        <p>Ao utilizar esta página, você concorda com estes Termos de Uso e com a legislação aplicável.</p>
        <h3>2. Uso da Plataforma</h3>
        <p>O acesso é destinado à consulta de informações e conteúdos disponibilizados pela equipe responsável.</p>
        <h3>3. Responsabilidades</h3>
        <p>Você concorda em fornecer informações verdadeiras e em não utilizar a plataforma para finalidades ilícitas.</p>
        <h3>4. Limitação</h3>
        <p>Os conteúdos possuem caráter informativo e podem ser atualizados sem aviso prévio.</p>
    `,
    privacidade: `
        <h3>1. Coleta de Dados</h3>
        <p>Podemos coletar dados de navegação e informações fornecidas por você para melhorar sua experiência.</p>
        <h3>2. Uso das Informações</h3>
        <p>Os dados são utilizados para autenticação de acesso, atendimento e comunicação relacionada ao serviço.</p>
        <h3>3. Compartilhamento</h3>
        <p>Não comercializamos dados pessoais. O compartilhamento ocorre apenas quando necessário ao funcionamento do serviço ou por obrigação legal.</p>
        <h3>4. Segurança</h3>
        <p>Adotamos medidas técnicas e administrativas para proteger suas informações.</p>
    `
};

const interval = setInterval(()=>{
    value++;
    progress.style.width = value + "%";
    percent.innerText = value + "%";

    if(value % 25 === 0 && countdown > 0){
        countdown--;
        timer.innerText = "Finalizando em " + countdown + "s...";
    }

    if(value >= 100){
        clearInterval(interval);
        percent.innerText = "PRONTO ✔";
        timer.innerText = "Sua condição foi liberada!";
        btn.classList.add("active");
        btn.innerText = "CONTINUAR";
    }

},30);

function openModal(type){
    if(type === "privacidade"){
        modalTitle.innerText = "Política de Privacidade";
        modalContent.innerHTML = legalText.privacidade;
    } else {
        modalTitle.innerText = "Termos de Uso";
        modalContent.innerHTML = legalText.termos;
    }
    legalModal.classList.add("show-modal");
}

function closeModal(event){
    if(event && event.target !== legalModal){
        return;
    }
    legalModal.classList.remove("show-modal");
}

function redirect(){
    if(value >= 100){
        window.location.href = "./fila.html" + window.location.search;
    }
}
</script>
</body>
</html>
